name: Discord Announcement

on:
  push:
    branches:
      - main

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Send to Discord
        run: |
          WEBHOOK_URL="https://discord.com/api/webhooks/1526743701668237373/fCA8L4M3d-eFCuRrqeJ6TQS3VgwLbABtEYQ-RXc4r23PZvUTjzXbZMIZyNfgar2mDZzK"
          
          HASH=$(git log -1 --pretty=format:"%h")
          BODY=$(git log -1 --pretty=format:"%B")
          AUTHOR=$(git log -1 --pretty=format:"%an")
          REPO_NAME="supercali-roleplay"
          BRANCH="main"
          COMMIT_URL="https://github.com/knxz-mxi/supercali-roleplay/commit/${HASH}"
          
          # Initialize variables for parsing
          INTRO=""
          FIXES=""
          FEATURES=""
          ASSETS=""
          CURRENT_SECTION="intro"
          
          # Parse lines
          while IFS= read -r line; do
            # Trim whitespace
            trimmed=$(echo "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            
            if [[ "$trimmed" =~ ^[uU][pP][dD][aA][tT][eE][[:space:]]+[aA][sS][sS][eE][tT][sS]: ]]; then
              CURRENT_SECTION="assets"
              continue
            elif [[ "$trimmed" =~ ^[uU][pP][dD][aA][tT][eE][[:space:]]+[lL][oO][gG][sS]: ]]; then
              CURRENT_SECTION="logs"
              continue
            fi
            
            if [[ "$CURRENT_SECTION" == "intro" ]]; then
              # Allow markdown/text for the introduction header
              INTRO+="$line"$'\n'
            # Match bullet points starting with - or *
            elif [[ "$trimmed" =~ ^[-*][[:space:]]+ ]]; then
              # Strip leading hyphen/asterisk and spaces
              content=$(echo "$trimmed" | sed -E 's/^[-*][[:space:]]+//')
              
              if [[ "$CURRENT_SECTION" == "assets" ]]; then
                ASSETS+=$'• '"$content"$'\n'
              else
                if [[ "$content" =~ "\[FIX\]" ]]; then
                  cleaned=$(echo "$content" | sed 's/\[FIX\]//g' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
                  FIXES+=$'🔧 '"$cleaned"$'\n'
                elif [[ "$content" =~ "\[NEW\]" ]]; then
                  cleaned=$(echo "$content" | sed 's/\[NEW\]//g' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
                  FEATURES+=$'✨ '"$cleaned"$'\n'
                else
                  FIXES+=$'• '"$content"$'\n'
                fi
              fi
            fi
          done <<< "$BODY"
          
          # Format description with parsed content directly (avoids field length limit)
          if [ ! -z "$INTRO" ] && [ "$(echo "$INTRO" | tr -d '[:space:]')" != "" ]; then
            FULL_DESC="$INTRO"$'\n'
          else
            FULL_DESC=$'Yo bre! Update log terbaru untuk kota kesayangan kita udah mendarat. Let\'s check what\'s cookin\'! 🔥\n\n'
          fi
          
          FULL_DESC+=$'**Commit:** [\`'"$HASH"'\`]('"$COMMIT_URL"') by **'"$AUTHOR"'**\n\n'
          
          if [ ! -z "$FEATURES" ]; then
            FULL_DESC="${FULL_DESC}"$'### ✨ New Features & Systems\n'"$FEATURES"$'\n'
          fi
          
          if [ ! -z "$FIXES" ]; then
            FULL_DESC="${FULL_DESC}"$'### 🔧 Bug Fixes & Improvements\n'"$FIXES"$'\n'
          fi
          
          if [ ! -z "$ASSETS" ]; then
            FULL_DESC="${FULL_DESC}"$'### 📦 Updated Assets\n'"$ASSETS"$'\n'
          fi
          
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Construct JSON Payload using jq (cleaner, safer embed structure)
          PAYLOAD=$(jq -n \
            --arg username "SuperCali Updates" \
            --arg avatar "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" \
            --arg title "🚀 SuperCali Close Beta Build Update" \
            --arg url "https://github.com/knxz-mxi/supercali-roleplay" \
            --arg desc "$FULL_DESC" \
            --arg timestamp "$TIMESTAMP" \
            '{
              username: $username,
              avatar_url: $avatar,
              content: "@everyone",
              embeds: [
                {
                  title: $title,
                  url: $url,
                  description: $desc,
                  color: 10181046,
                  footer: {
                    text: "SuperCali Roleplay • Close Beta Version",
                    icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                  },
                  timestamp: $timestamp
                }
              ]
            }')
            
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$WEBHOOK_URL"
